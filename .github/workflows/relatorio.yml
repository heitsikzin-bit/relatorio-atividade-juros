name: Relatório Mensal

on:
  schedule:
    - cron: "0 12 5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install pandas requests matplotlib openpyxl python-dateutil

      - name: Rodar script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python script.py

      - name: Salvar arquivos no repositório
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Relatório $(date +%Y-%m)"
          git push

      - name: Disponibilizar para download
        uses: actions/upload-artifact@v4
        with:
          name: relatorio
          path: |
            relatorio_atividade_juros.xlsx
            eua.csv
            brasil.csv
            estatisticas.csv
            comparacao_sa_nsa.csv
            relatorio.png
